<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Kings Bakery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        header {
            background: #fff;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #c97a2b;
        }

        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #333;
        }

        .btn {
            background: #e67e22;
            color: #fff;
            padding: 8px 15px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            border-radius: 4px;
        }

        .btn:hover {
            background: #d35400;
        }

        .hero {
            background: url('https://unsplash.com') no-repeat center center/cover;
            color: rgb(0, 0, 0);
            text-align: center;
            padding: 100px 20px;
        }

        .hero h2 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        .section {
            padding: 40px;
            text-align: center;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin: 15px 0;
            color: #333;
        }

        /* Added interactive cursor styling for the image functionality */
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        /* Gives a visual hint to users that the picture is clickable */
        .card img:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        .contact-form {
            max-width: 500px;
            margin: 20px auto 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-form input, 
        .contact-form textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .contact-form textarea {
            height: 120px;
            resize: vertical;
        }

        footer {
            background: #f99a00;
            color: rgb(255, 255, 255);
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }

        @media (max-width:768px) {
            header {
                flex-direction: column;
                gap: 15px;
            }
            nav {
                text-align: center;
            }
            nav a {
                display: inline-block;
                margin: 5px 10px;
            }
            .cards {
                flex-direction: column;
                align-items: center;
            }
        }

        @media (max-width:480px) {
            header {
                padding: 20px;
            }
            nav a {
                display: block;
                margin: 10px 0;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Fresh Kings Bakery</h1>
        <nav>
            <a href="home.html2.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="service.html">Services</a>
            <a href="order page.html">Order Online</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <section class="hero">
        <h2>Freshly Baked with Love</h2>
        <p>Delicious Cakes, Pastries & Breads</p>
        <button class="btn" id="hero-order-btn">Order Online</button>
    </section>

    <section class="section">
        <h2>Our Bestsellers</h2>
        <div class="cards">
            <div class="card">
                <!-- Clickable Image -->
                <img src="images/picture 5.jpg" alt="Chocolate Cake" class="clickable-product">
                <h3>Chocolate Cake</h3>
                <button class="btn learn-more-btn">Order Now</button>
            </div>

            <div class="card">
                <!-- Clickable Image -->
                <img src="images/picture 3.jpg" alt="Sourdough Bread" class="clickable-product">
                <h3>Sourdough Bread</h3>
                <button class="btn learn-more-btn">Order Now</button>
            </div>

            <div class="card">
                <!-- Clickable Image -->
                <img src="images/picture 4.jpg" alt="Buttery Croissants" class="clickable-product">
                <h3>Buttery Croissants</h3>
                <button class="btn learn-more-btn">Order Now</button>
            </div>
        </div>
    </section>

    <section class="section">
        <h2>Enquire Now</h2>
        <form class="contact-form" id="home-contact-form">
            <input type="text" id="contact-name" placeholder="Name" required>
            <input type="email" id="contact-email" placeholder="Email" required>
            <textarea id="contact-message" placeholder="Message" required></textarea>
            <button type="submit" class="btn">Send Message</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Fresh Kings Bakery | All Rights Reserved</p>
    </footer>

    <!-- JavaScript Functionality --> 
        <script>
        // Function to handle the online order page redirection
        function redirectToOrderPage() {
            window.location.href = 'order page.html';
        }

        // Redirection for Hero Banner Button
        document.getElementById('hero-order-btn').addEventListener('click', redirectToOrderPage);

        // Redirection for Bestseller Card Buttons
        document.querySelectorAll('.learn-more-btn').forEach(button => {
            button.addEventListener('click', redirectToOrderPage);
        });

        // PICTURE FUNCTIONALITY: Click handlers for product pictures
        document.querySelectorAll('.clickable-product').forEach(image => {
            image.addEventListener('click', redirectToOrderPage);
        });

        // Contact Form Handler
        document.getElementById('home-contact-form').addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            const name = document.getElementById('contact-name').value;
            const email = document.getElementById('contact-email').value;

            alert(`Thank you, ${name}! Your inquiry has been received. We will respond to ${email} shortly.`);
            this.reset(); 
        });
    </script>

</body>
</html>
